<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visual Ingestion Test Page</title>
    <style>
        body { margin: 0; font-family: sans-serif; }
        header { background: #333; color: white; padding: 20px; height: 60px; }
        nav { display: flex; gap: 10px; }
        main { padding: 20px; min-height: 400px; }
        .container { border: 1px solid #ccc; padding: 20px; margin-top: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        footer { background: #eee; padding: 20px; text-align: center; height: 50px; }
    </style>
</head>
<body>
    <header id="header-section">
        <nav id="main-nav">
            <button id="nav-btn-1">Dashboard</button>
            <button id="nav-btn-2">Settings</button>
        </nav>
    </header>
    <main id="main-content">
        <section class="container" id="content-container">
            <button id="action-btn">Submit Form</button>
        </section>
    </main>
    <footer id="footer-section">
        <p>Copyright &copy; 2026</p>
    </footer>
</body>
</html>
